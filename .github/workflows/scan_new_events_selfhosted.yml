name: Scan New Events (SeatGeek, self-hosted)

# Same SeatGeek-from-GitHub-Actions 403 as check_prices_selfhosted.yml — this
# job only runs on a self-hosted (residential-IP) runner. Ticketmaster
# discovery keeps running reliably in the cloud via scan_new_events.yml
# regardless of this runner's availability.

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ticketwatch-db
  cancel-in-progress: false

jobs:
  scan:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan for new events (SeatGeek only)
        working-directory: agent
        run: python auto_suggest.py --platforms seatgeek
        env:
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Commit price database
        run: |
          git config user.name "ticketwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore(db): event scan (seatgeek/self-hosted) $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
