name: Check Prices

on:
  schedule:
    - cron: '0 * * * *'   # Every hour; Python skips events not due yet
  workflow_dispatch:        # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore price database
        uses: actions/cache@v4
        with:
          path: data/prices.db
          key: prices-db-${{ github.run_id }}
          restore-keys: prices-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        working-directory: agent
        run: python fetcher.py
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}
          STUBHUB_CLIENT_ID: ${{ secrets.STUBHUB_CLIENT_ID }}
          STUBHUB_CLIENT_SECRET: ${{ secrets.STUBHUB_CLIENT_SECRET }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Save price database
        uses: actions/cache@v4
        with:
          path: data/prices.db
          key: prices-db-${{ github.run_id }}
