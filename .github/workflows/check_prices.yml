name: Check Prices

on:
  schedule:
    - cron: '0 * * * *'   # Hourly; fetcher.py decides per-event whether a check is due
  workflow_dispatch:

permissions:
  contents: write          # Needed to commit prices.db back to the repo

# One writer at a time across all TicketWatch workflows — prevents DB clobbering
concurrency:
  group: ticketwatch-db
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        working-directory: agent
        run: python fetcher.py
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}
          STUBHUB_CLIENT_ID: ${{ secrets.STUBHUB_CLIENT_ID }}
          STUBHUB_CLIENT_SECRET: ${{ secrets.STUBHUB_CLIENT_SECRET }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Commit price database
        run: |
          git config user.name "ticketwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore(db): price check $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            # Rebase in case a human pushed code mid-run; DB conflicts can't
            # happen because the concurrency group serializes all DB writers.
            git pull --rebase origin main
            git push origin main
          fi
