name: Scan New Events

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ticketwatch-db
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan for new events
        working-directory: agent
        run: python auto_suggest.py
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Commit price database
        run: |
          git config user.name "ticketwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore(db): event scan $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
